<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>{% block title %}Admin{% endblock %} — DrawReport</title>
<link rel="stylesheet" href="/static/css/fonts.css">
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/components.css">
<style>
  body { background: var(--alt); }
  .adm { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
  .adm-side { background: var(--ink); color: #fff; padding: 18px 0; }
  .adm-side__brand { font-family: var(--font-head); font-weight: 800; padding: 0 18px 14px; }
  .adm-side a { display: block; padding: 9px 18px; color: #e8dccb; text-decoration: none; font-size: 15px; }
  .adm-side a.is-active, .adm-side a:hover { background: rgba(255,255,255,.10); color: #fff; }
  .adm-side form { padding: 14px 18px 0; }
  .adm-main { padding: 24px 28px; max-width: 1100px; }
  .adm-main h1 { font-size: 26px; margin: 0 0 4px; }
  .periods a { display: inline-block; padding: 4px 10px; border: 1px solid var(--line); border-radius: 99px; margin-right: 6px; font-size: 13px; text-decoration: none; color: var(--muted); }
  .periods a.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .kpis { display: flex; gap: 14px; flex-wrap: wrap; margin: 16px 0; }
  .kpi { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 14px 18px; min-width: 130px; }
  .kpi b { display: block; font-size: 26px; font-family: var(--font-head); }
  .kpi span { font-size: 13px; color: var(--muted); }
  table.adm { width: 100%; border-collapse: collapse; background: var(--paper); border-radius: 12px; overflow: hidden; }
  table.adm th, table.adm td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: top; }
  table.adm th { background: var(--bg-soft); font-weight: 600; }
  .bar { background: var(--line); border-radius: 6px; height: 16px; position: relative; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 6px; }
  .pill { display:inline-block; padding:2px 8px; border-radius:99px; font-size:12px; background:var(--line); }
  .msg { background: var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin:12px 0; }
  textarea, input[type=text], input[type=number] { width: 100%; font: inherit; padding: 7px 9px; border: 1px solid var(--line); border-radius: 8px; }
</style>
</head>
<body>
<div class="adm">
  <nav class="adm-side">
    <div class="adm-side__brand"><b>Draw</b>Report</div>
    {% for endpoint, label in sections %}
    <a href="{{ url_for(endpoint) }}" class="{% if endpoint == active %}is-active{% endif %}">{{ label }}</a>
    {% endfor %}
    <form method="post" action="{{ url_for('admin.logout') }}">
      <button class="btn btn--ghost" type="submit" style="width:100%">Log out</button>
    </form>
  </nav>
  <main class="adm-main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
