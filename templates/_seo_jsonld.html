{# Organization + WebSite JSON-LD on every _base page (the landing adds its own
   Product/FAQ set from routes). Educational positioning, no esoterica. #}

[{"@context":"https://schema.org","@type":"Organization",
  "name":"{{ site_name }}","url":"{{ public_base_url }}/",
  "logo":"{{ public_base_url }}/static/img/og-default.png",
  "description":"Educational analysis of a child's drawing from a photo: a personal PDF report on what the drawing shows about the child - strengths, interests and skills - grounded in the developmental stages of children's art. Not a diagnosis.",
  "knowsLanguage":"{{ locale }}"},
 {"@context":"https://schema.org","@type":"WebSite",
  "name":"{{ site_name }}","url":"{{ public_base_url }}/","inLanguage":"{{ locale }}"}]
</script>
