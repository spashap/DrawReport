{% extends "_email_base.html" %}
{# Account login code. #}
{% block content %}
<h2 style="font-size:22px; margin:0 0 14px">Your login code</h2>
<p style="font-size:15px; line-height:1.6; margin:0 0 18px">
  Enter this code on the sign-in page. It's valid for {{ ttl_minutes }} minutes
  and works only once.
</p>
<p style="text-align:center; margin:0 0 18px">
  <span style="display:inline-block; background:#FFF8EA; border-radius:10px;
        font-size:30px; font-weight:bold; letter-spacing:8px; padding:14px 26px">{{ code }}</span>
</p>
<p style="font-size:13px; color:#6E5942; line-height:1.6; margin:0">
  If you didn't request a sign-in, just ignore this email.
</p>
{% endblock %}
