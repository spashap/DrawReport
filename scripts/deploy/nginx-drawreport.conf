# /etc/nginx/sites-available/drawreport.com  (symlink into sites-enabled/)
# DrawReport vhost. Own server block - does NOT touch cosmyday-api's vhost.
# After this is in place, run certbot to add the TLS (443) block + redirect:
#   certbot --nginx -d drawreport.com -d www.drawreport.com
server {
    listen 80;
    listen [::]:80;
    server_name drawreport.com www.drawreport.com;

    client_max_body_size 50M;     # uploads: up to 3 drawings x 15 MB

    # served by Flask/gunicorn; static is also proxied (Flask serves /static)
    location /static/ {
        alias /var/www/drawreport/static/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
